<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Social-share preview for LinkedIn, Twitter, etc.
       Refreshed in 2026 to drop the green Raqib-era palette and
       magnifying-glass icon in favour of the Mithaq trefoil + navy
       gradient that match the rest of the platform. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#1E3A6B"/>
    </linearGradient>
    <radialGradient id="markDeep" cx="600" cy="280" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3D6FBF"/>
      <stop offset="55%" stop-color="#1E3A6B"/>
      <stop offset="100%" stop-color="#0A1F3D"/>
    </radialGradient>
    <radialGradient id="markBright" cx="600" cy="280" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B8D4F5"/>
      <stop offset="100%" stop-color="#5A8FD8"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Trefoil mark — centred above the title, sized for OG card
       legibility at small sharing-card render dimensions. -->
  <g transform="translate(600, 230)">
    <g fill="none" stroke="url(#markDeep)" stroke-width="22" stroke-linejoin="round">
      <path d="M 0,-130 C 34,-130 52,-75 38,-37 Q 23,-19 0,-6 Q -23,-19 -38,-37 C -52,-75 -34,-130 0,-130 Z"/>
      <path d="M 0,-130 C 34,-130 52,-75 38,-37 Q 23,-19 0,-6 Q -23,-19 -38,-37 C -52,-75 -34,-130 0,-130 Z" transform="rotate(120)"/>
      <path d="M 0,-130 C 34,-130 52,-75 38,-37 Q 23,-19 0,-6 Q -23,-19 -38,-37 C -52,-75 -34,-130 0,-130 Z" transform="rotate(240)"/>
    </g>
    <g fill="none" stroke="url(#markBright)" stroke-width="7" stroke-linejoin="round">
      <path d="M 0,-130 C 34,-130 52,-75 38,-37 Q 23,-19 0,-6 Q -23,-19 -38,-37 C -52,-75 -34,-130 0,-130 Z"/>
      <path d="M 0,-130 C 34,-130 52,-75 38,-37 Q 23,-19 0,-6 Q -23,-19 -38,-37 C -52,-75 -34,-130 0,-130 Z" transform="rotate(120)"/>
      <path d="M 0,-130 C 34,-130 52,-75 38,-37 Q 23,-19 0,-6 Q -23,-19 -38,-37 C -52,-75 -34,-130 0,-130 Z" transform="rotate(240)"/>
    </g>
    <path d="M 0,-20 L 17.3,10 L -17.3,10 Z" fill="none" stroke="#7BA8E0" stroke-width="2.8" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="0" cy="0" r="5" fill="#B8D4F5"/>
  </g>

  <!-- Title -->
  <text x="600" y="450" text-anchor="middle" fill="#ffffff" font-family="IBM Plex Sans Arabic, sans-serif" font-size="64" font-weight="700">ميثاق | Mithaq</text>

  <!-- Subtitle AR -->
  <text x="600" y="510" text-anchor="middle" fill="#5A8FD8" font-family="IBM Plex Sans Arabic, sans-serif" font-size="26" font-weight="400">مشروع تقني سعودي قيد التطوير لحوكمة البيانات</text>

  <!-- Subtitle EN -->
  <text x="600" y="552" text-anchor="middle" fill="#94A3B8" font-family="Inter, sans-serif" font-size="22" font-weight="400">Saudi Data Governance — In Active Development</text>

  <!-- Frameworks line -->
  <text x="600" y="608" text-anchor="middle" fill="#7BA8E0" font-family="Inter, sans-serif" font-size="16" font-weight="500" letter-spacing="2">NDMO • PDPL • NCA ECC • SDAIA AI</text>
</svg>
