<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- PWA maskable icon — Mithaq trefoil. Background fills the
       full square so Android adaptive icons render cleanly; the
       mark sits comfortably inside the 80% safe zone. -->
  <rect width="192" height="192" rx="42" fill="#0A1628"/>

  <defs>
    <radialGradient id="m192deep" cx="96" cy="96" r="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3D6FBF"/>
      <stop offset="55%" stop-color="#1E3A6B"/>
      <stop offset="100%" stop-color="#0A1F3D"/>
    </radialGradient>
    <radialGradient id="m192bright" cx="96" cy="96" r="65" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B8D4F5"/>
      <stop offset="100%" stop-color="#5A8FD8"/>
    </radialGradient>
  </defs>

  <!-- Trefoil — three teardrop petals at 0° / 120° / 240°, drawn
       twice (outer dark band + inner light stripe). Coordinates
       chosen so the silhouette spans ~120×105 within the 192×192
       canvas, leaving a comfortable margin from the rounded edge. -->
  <g transform="translate(96, 100)">
    <g fill="none" stroke="url(#m192deep)" stroke-width="11" stroke-linejoin="round">
      <path d="M 0,-62 C 16,-62 25,-36 18,-18 Q 11,-9 0,-3 Q -11,-9 -18,-18 C -25,-36 -16,-62 0,-62 Z"/>
      <path d="M 0,-62 C 16,-62 25,-36 18,-18 Q 11,-9 0,-3 Q -11,-9 -18,-18 C -25,-36 -16,-62 0,-62 Z" transform="rotate(120)"/>
      <path d="M 0,-62 C 16,-62 25,-36 18,-18 Q 11,-9 0,-3 Q -11,-9 -18,-18 C -25,-36 -16,-62 0,-62 Z" transform="rotate(240)"/>
    </g>
    <g fill="none" stroke="url(#m192bright)" stroke-width="3.2" stroke-linejoin="round">
      <path d="M 0,-62 C 16,-62 25,-36 18,-18 Q 11,-9 0,-3 Q -11,-9 -18,-18 C -25,-36 -16,-62 0,-62 Z"/>
      <path d="M 0,-62 C 16,-62 25,-36 18,-18 Q 11,-9 0,-3 Q -11,-9 -18,-18 C -25,-36 -16,-62 0,-62 Z" transform="rotate(120)"/>
      <path d="M 0,-62 C 16,-62 25,-36 18,-18 Q 11,-9 0,-3 Q -11,-9 -18,-18 C -25,-36 -16,-62 0,-62 Z" transform="rotate(240)"/>
    </g>

    <!-- Bind triangle + centre node — same accents as the inline
         MithaqLogo so the favicon and the in-page mark feel like
         one family. -->
    <path d="M 0,-10 L 8.66,5 L -8.66,5 Z" fill="none" stroke="#7BA8E0" stroke-width="1.4" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="0" cy="0" r="2.4" fill="#B8D4F5"/>
  </g>
</svg>
