    <!--
      Favicon stack — SVG first for crisp rendering at any zoom (modern
      browsers prefer it), with PNG fallbacks for the small minority
      that don't support SVG favicons. The PNG variants are rasterised
      from icon-192.svg, so all three favicon assets show the same
      trefoil mark as the in-app MithaqLogo component.
    -->
    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/mithaq-logo-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/mithaq-logo-180.png" />
    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ميثاق" />
    <!--
      Structured Data (JSON-LD) for SEO.

      Previous version was inherited from the Raqib SaaS era and
      declared the platform as a SoftwareApplication with a 5,000 SAR
      monthly subscription offer + a FAQPage that answered pricing
      questions. Both were lies for a brochure-stage portfolio
      project. The new entries describe what Mithaq actually is right
      now: a portfolio/showcase site for an in-development project.
    -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "ميثاق | Mithaq",
        "alternateName": "Mithaq Data Governance",
        "url": "https://mithaq.sa",
        "description": "Portfolio site presenting Mithaq — a Saudi technical project in active development for data governance under NDMO, PDPL, and NCA ECC.",
        "inLanguage": ["ar-SA", "en-SA"]
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "ما هي منصة ميثاق؟",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ميثاق منصة لحوكمة البيانات السعودية مصمَّمة للجهات الخاضعة لأُطر NDMO و PDPL و NCA ECC وأخلاقيات SDAIA للذكاء الاصطناعي. ما تراه الآن عرضٌ تفصيلي للرؤية والقدرات؛ المنتج التشغيلي قيد التطوير النشط."
            }
          },
          {
            "@type": "Question",
            "name": "في أي مرحلة من التطوير المشروع حالياً؟",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "المشروع قيد التطوير النشط. المنصة الحالية تعرض الرؤية والقدرات بتصاميم مكتملة وتفاعلية لكل محور. البرنامج التشغيلي في مرحلة بناء الـMVP."
            }
          },
          {
            "@type": "Question",
            "name": "هل يعمل ميثاق داخل شبكة المؤسسة فقط؟",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "نعم — البرنامج التشغيلي مصمَّم للعمل بالكامل داخل البنية التحتية للجهة (on-premise) دون اتصال خارجي. الأدوات السحابية غير مدعومة لتفادي عبور البيانات الحدود الوطنية."
            }
          }
        ]
      }
    ]
    </script>
    <!--
      Professional bilingual fonts: Inter (EN) + IBM Plex Sans Arabic (AR)
      Security note: SRI (integrity=) cannot be applied to Google Fonts CSS
      because the response varies by User-Agent. Mitigated via CSP in
      client/public/_headers (style-src + font-src whitelist the Google
      Fonts origins). Self-hosting is recommended for air-gapped deploys.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Flash prevention: apply saved theme before any paint -->
    <script>
      (function(){
        var t = localStorage.getItem('mithaq-theme');
        if (t === 'light') {
          document.documentElement.classList.remove('dark');
        }
        // default: dark class is already on <html>
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics: injected at runtime via AnalyticsLoader when env vars are set -->
  </body>
